# ===========================================
# 云端牧场 Docker Compose 配置 - 支持自动HTTPS
# ===========================================
# 使用方式：
#   1. 复制 .env.docker 为 .env 并配置 DOMAIN 和 EMAIL
#   2. docker compose up -d
#   3. 系统自动申请SSL证书并配置HTTPS
# ===========================================
version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/mysql:8.0
    container_name: cloud-ranch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: cloud_ranch
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/init-database.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cloud-ranch-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Redis 缓存
  redis:
    image: crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/redis:latest
    container_name: cloud-ranch-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123456}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - cloud-ranch-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud-ranch-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      DB_DATABASE: cloud_ranch
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      # JWT配置
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      # 支付宝配置
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      # 微信配置
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_MCH_ID: ${WECHAT_MCH_ID:-}
      WECHAT_PAY_KEY: ${WECHAT_PAY_KEY:-}
      WECHAT_API_V3_KEY: ${WECHAT_API_V3_KEY:-}
      WECHAT_SERIAL_NO: ${WECHAT_SERIAL_NO:-}
      WECHAT_PRIVATE_KEY: ${WECHAT_PRIVATE_KEY:-}
      # 短信配置
      ALIYUN_SMS_ACCESS_KEY_ID: ${ALIYUN_SMS_ACCESS_KEY_ID:-}
      ALIYUN_SMS_ACCESS_KEY_SECRET: ${ALIYUN_SMS_ACCESS_KEY_SECRET:-}
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME:-}
      ALIYUN_SMS_TEMPLATE_CODE: ${ALIYUN_SMS_TEMPLATE_CODE:-}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloud-ranch-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # 前端服务 - 支持HTTPS
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloud-ranch-frontend
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-}
      EMAIL: ${EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL证书持久化
      - certbot_letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      # Nginx配置模板
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/nginx.https.conf.template:/etc/nginx/templates/nginx.https.conf.template:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cloud-ranch-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot SSL证书管理
  certbot:
    image: certbot/certbot:latest
    container_name: cloud-ranch-certbot
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-}
      EMAIL: ${EMAIL:-}
      STAGING: ${STAGING:-0}
    volumes:
      - certbot_letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ./nginx/init-letsencrypt.sh:/init-letsencrypt.sh:ro
      - ./nginx/renew-certs.sh:/renew-certs.sh:ro
    depends_on:
      - frontend
    networks:
      - cloud-ranch-network
    entrypoint: "/bin/sh -c 'cp /init-letsencrypt.sh /tmp/init.sh && cp /renew-certs.sh /tmp/renew.sh && chmod +x /tmp/*.sh && /tmp/init.sh && crond -f -l 2'"
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3

networks:
  cloud-ranch-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  certbot_letsencrypt:
  certbot_www:
