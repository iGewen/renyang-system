# ===========================================
# 云端牧场 Docker Compose 配置 - 支持自动HTTPS
# ===========================================
# 使用方式：
#   1. 复制 .env.docker 为 .env 并配置 DOMAIN 和 EMAIL
#   2. docker compose -f docker-compose.https.yml up -d
#   3. 系统自动申请SSL证书并配置HTTPS
#   4. 证书每12小时自动检查续期
# ===========================================

services:
  # Secrets 自动初始化服务
  secrets-init:
    image: alpine:3.19
    container_name: cloud-ranch-secrets-init
    volumes:
      - ./secrets:/secrets
    command: |
      sh -c "
        mkdir -p /secrets
        cd /secrets
        for secret in jwt_secret db_password redis_password encryption_key; do
          if [ ! -f $${secret}.txt ]; then
            echo \"Creating $${secret}.txt...\"
            head -c 48 /dev/urandom | hexdump -C | awk '{print $$2$$3$$4$$5}' | head -c 48 > $${secret}.txt
            chmod 600 $${secret}.txt
          fi
        done
        if [ ! -f .gitignore ]; then
          echo '# 敏感信息' > .gitignore
          echo '*' >> .gitignore
          echo '!.gitignore' >> .gitignore
        fi
        echo 'Secrets initialized'
      "
    restart: "no"

  # MySQL 数据库
  mysql:
    image: crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/mysql:8.0
    container_name: cloud-ranch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_DATABASE: cloud_ranch
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    secrets:
      - db_password
    # 安全修复：仅绑定本地
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./mysql/charset.cnf:/etc/mysql/conf.d/charset.cnf:ro
    networks:
      - cloud-ranch-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Redis 缓存
  redis:
    image: crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/redis:latest
    container_name: cloud-ranch-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass_file /run/secrets/redis_password
    secrets:
      - redis_password
    # 安全修复：仅绑定本地
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - cloud-ranch-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$$(cat /run/secrets/redis_password) redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud-ranch-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD_FILE: /run/secrets/db_password
      DB_DATABASE: cloud_ranch
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_EXPIRES_IN: 7d
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    secrets:
      - jwt_secret
      - db_password
      - redis_password
      - encryption_key
    # 安全修复：不暴露端口，通过 nginx 代理
    expose:
      - "3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      secrets-init:
        condition: service_completed_successfully
    networks:
      - cloud-ranch-network
    volumes:
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # 前端服务 - 支持HTTPS
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloud-ranch-frontend
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-}
      EMAIL: ${EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - nginx_conf:/etc/nginx/conf.d
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cloud-ranch-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot SSL证书管理 - 初始化
  certbot-init:
    image: certbot/certbot:latest
    container_name: cloud-ranch-certbot-init
    restart: "no"
    environment:
      DOMAIN: ${DOMAIN:-}
      EMAIL: ${EMAIL:-}
      STAGING: ${STAGING:-0}
    volumes:
      - certbot_letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - nginx_conf:/etc/nginx/conf.d
      - ./nginx/init-letsencrypt.sh:/init-letsencrypt.sh:ro
    depends_on:
      frontend:
        condition: service_started
    networks:
      - cloud-ranch-network
    entrypoint: "/bin/sh -c 'cp /init-letsencrypt.sh /tmp/init.sh && chmod +x /tmp/init.sh && /tmp/init.sh'"

  # Certbot 证书自动续期服务 - 每12小时检查一次
  certbot-renew:
    image: certbot/certbot:latest
    container_name: cloud-ranch-certbot-renew
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - certbot_letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - cloud-ranch-network
    # 每12小时检查证书续期，Let's Encrypt 证书有效期90天，提前30天续期
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

  # MySQL 自动备份服务
  mysql-backup:
    image: databack/mysql-backup:latest
    container_name: cloud-ranch-mysql-backup
    restart: unless-stopped
    environment:
      DB_SERVER: mysql
      DB_USER: root
      DB_PASS_FILE: /run/secrets/db_password
      DB_NAMES: cloud_ranch
      DB_DUMP_FREQ: 1440
      DB_DUMP_BEGIN: 0300
      COMPRESSION: gzip
      DB_DUMP_KEEP: 7
      MD5: "true"
    secrets:
      - db_password
    volumes:
      - mysql_backups:/backups
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cloud-ranch-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  cloud-ranch-network:
    driver: bridge

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  encryption_key:
    file: ./secrets/encryption_key.txt

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  mysql_backups:
  certbot_letsencrypt:
  certbot_www:
  nginx_conf:
