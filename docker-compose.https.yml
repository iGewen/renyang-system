# ===========================================
# 云端牧场 Docker Compose 配置 - 支持自动HTTPS
# ===========================================
# 使用方式：
#   1. 复制 .env.docker 为 .env 并配置 DOMAIN、EMAIL 和密码
#   2. docker compose -f docker-compose.https.yml up -d
#   3. 系统自动申请SSL证书并配置HTTPS
#   4. 证书每12小时自动检查续期
# ===========================================

services:
  # MySQL 数据库
  mysql:
    image: crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/mysql:8.0
    container_name: cloud-ranch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?ERROR: MYSQL_ROOT_PASSWORD must be set}"
      MYSQL_DATABASE: cloud_ranch
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./mysql/charset.cnf:/etc/mysql/conf.d/charset.cnf:ro
    networks:
      - cloud-ranch-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Redis 缓存
  redis:
    image: crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/redis:7.2-alpine
    container_name: cloud-ranch-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set}"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set}"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - cloud-ranch-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud-ranch-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: "${MYSQL_ROOT_PASSWORD:?ERROR: MYSQL_ROOT_PASSWORD must be set}"
      DB_DATABASE: cloud_ranch
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set}"
      # JWT配置
      JWT_SECRET: "${JWT_SECRET:?ERROR: JWT_SECRET must be set}"
      JWT_EXPIRES_IN: 7d
      # 加密密钥
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ERROR: ENCRYPTION_KEY must be set}"
      # 管理员配置
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-}
      # CORS配置
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    expose:
      - "3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloud-ranch-network
    volumes:
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # 前端服务 - 支持HTTPS
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloud-ranch-frontend
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-}
      EMAIL: ${EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - nginx_conf:/etc/nginx/conf.d
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cloud-ranch-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot SSL证书管理 - 初始化
  certbot-init:
    image: certbot/certbot:latest
    container_name: cloud-ranch-certbot-init
    restart: "no"
    environment:
      DOMAIN: ${DOMAIN:-}
      EMAIL: ${EMAIL:-}
      STAGING: ${STAGING:-0}
    volumes:
      - certbot_letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - nginx_conf:/etc/nginx/conf.d
      - ./nginx/init-letsencrypt.sh:/init-letsencrypt.sh:ro
    depends_on:
      frontend:
        condition: service_started
    networks:
      - cloud-ranch-network
    entrypoint: "/bin/sh -c 'cp /init-letsencrypt.sh /tmp/init.sh && chmod +x /tmp/init.sh && /tmp/init.sh'"

  # Certbot 证书自动续期服务 - 每12小时检查一次
  certbot-renew:
    image: certbot/certbot:latest
    container_name: cloud-ranch-certbot-renew
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - certbot_letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - cloud-ranch-network
    # 每12小时检查证书续期，Let's Encrypt 证书有效期90天，提前30天续期
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

networks:
  cloud-ranch-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  mysql_backups:
  certbot_letsencrypt:
  certbot_www:
  nginx_conf:
