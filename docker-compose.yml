# 云端牧场 Docker Compose 配置
# 兼容 Docker Compose V1 (docker-compose) 和 V2 (docker compose)
# 使用方式：
#   新版: docker compose up -d
#   旧版: docker-compose up -d
#
# TODO: I-L02 缺少监控/告警基础设施
# 生产环境建议添加：
# 1. Prometheus - 指标收集
# 2. Grafana - 可视化仪表盘
# 3. AlertManager - 告警通知
# 4. Loki - 日志聚合
# 示例配置参考: https://github.com/prometheus/prometheus/blob/main/documentation/examples/docker-compose.yml
#
# TODO: I-M14 Docker 安全加固 - 只读文件系统
# 生产环境可考虑为无状态服务添加只读文件系统：
# read_only: true
# tmpfs:
#   - /tmp
#   - /var/cache/nginx
# 注意：需要根据具体应用需求调整，可能影响某些功能

services:
  # MySQL 数据库 - 使用阿里云ACR镜像
  mysql:
    image: crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/mysql:8.0
    container_name: cloud-ranch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?ERROR: MYSQL_ROOT_PASSWORD must be set}"
      MYSQL_DATABASE: cloud_ranch
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./mysql/charset.cnf:/etc/mysql/conf.d/charset.cnf:ro
    networks:
      - cloud-ranch-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Redis 缓存 - 使用阿里云ACR镜像
  redis:
    image: crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/redis:latest
    container_name: cloud-ranch-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set}"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set}"
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - cloud-ranch-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务 - 自动构建
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud-ranch-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # 数据库配置 - 直接使用环境变量
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: "${MYSQL_ROOT_PASSWORD:?ERROR: MYSQL_ROOT_PASSWORD must be set}"
      DB_DATABASE: cloud_ranch
      # Redis配置 - 直接使用环境变量
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD must be set}"
      # JWT配置 - 直接使用环境变量
      JWT_SECRET: "${JWT_SECRET:?ERROR: JWT_SECRET must be set}"
      JWT_EXPIRES_IN: 7d
      # 加密密钥 - 直接使用环境变量
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ERROR: ENCRYPTION_KEY must be set}"
      # 管理员配置
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-}
      # CORS配置
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloud-ranch-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    volumes:
      - uploads_data:/app/uploads

  # 前端服务 - 自动构建
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloud-ranch-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cloud-ranch-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  cloud-ranch-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  mysql_backups:
